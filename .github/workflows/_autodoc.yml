name: Update documentation

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PR_GITHUB_USER: qe-repo-updater[bot] <152897211+qe-repo-updater[bot]@users.noreply.github.com>

jobs:
  autodoc:
    name: autodoc
    runs-on: ubuntu-latest

    steps:
      - name: Install auto-doc
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: tj-actions/auto-doc

      - name: Get Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.WORKFLOW_UPDATE_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_UPDATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "${{ github.event.repository.name}}"
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Run auto-doc
        run: |
          #!/usr/bin/env bash

          mapfile -t workflow_files < <(find ".github/workflows" -type f -name "*.yml")
          for workflow_file in "${workflow_files[@]}"; do
            workflow="$(basename "$workflow_file")"
            workflow_name="${workflow%%.yml}"
            workflow_doc="./docs/$workflow_name.md"
            if [[ -f "$workflow_doc" ]]; then
              auto-doc --colMaxWords 100 --reusable --filename "$workflow_file" --output "$workflow_doc"
            else
              echo "Skip $workflow because no documentation"
            fi
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          committer: ${{ env.PR_GITHUB_USER }}
          author: ${{ env.PR_GITHUB_USER }}
          commit-message: "docs: update workflow documentation"
          branch: doc/autodoc
          title: "docs: update workflow documentation"
          body: |
            [auto-doc](https://github.com/tj-actions/auto-doc) made some changes to various README.md files

            Automated changes by [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
