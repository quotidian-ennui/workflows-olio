name: action-dependabot-merge
on:
  workflow_call:
    inputs:
      client_id:
        description: "GitHub App Client ID"
        required: true
        type: string

    secrets:
      app_private_key:
        required: true
        description: The private key associated with the App ID

jobs:
  actions_merge:
    runs-on: ubuntu-latest
    name: Dependabot Merge (action changes)
    permissions: {}
    if: |
      github.event.client_payload.base.actor == 'dependabot[bot]'
    steps:
      - name: "Create Token (using client-id)"
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token-client-id
        with:
          client-id: ${{ inputs.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name}}

      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token-client-id.outputs.token }}
          ref: ${{ github.event.client_payload.base.ref }}
          persist-credentials: false

      - name: Dependabot Merge
        id: dependabot_merge
        uses: quotidian-ennui/actions-olio/dependabot-merge@528d118cf867515584403396edee8a564a23bc00 # v1.3.0
        with:
          token: ${{ steps.app-token-client-id.outputs.token }}
          change_filter: ".github/workflows/**"
