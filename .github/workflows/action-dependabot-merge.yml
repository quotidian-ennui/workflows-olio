name: action-dependabot-merge
on:
  workflow_call:
    inputs:
      client_id:
        description: "GitHub App Client ID with permission to manage dependabot alerts"
        required: true
        type: string

    secrets:
      app_private_key:
        required: true
        description: The private key associated with the App ID

jobs:
  actions_merge:
    runs-on: ubuntu-latest
    name: Dependabot Merge (action changes)
    permissions: {}
    if: |
      github.event.client_payload.base.actor == 'dependabot[bot]'
    steps:
      - name: "Create Token (using client-id)"
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token-client-id
        with:
          client-id: ${{ inputs.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name}}

      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token-client-id.outputs.token }}
          ref: ${{ github.event.client_payload.base.ref }}
          persist-credentials: false

      - name: Dependabot Merge
        id: dependabot_merge
        uses: quotidian-ennui/actions-olio/dependabot-merge@7ee535611789442d6fa202dc02a19c81bf2c4458 # v0.10.4
        with:
          token: ${{ steps.app-token-client-id.outputs.token }}
          change_filter: ".github/workflows/**"
