name: action-dependabot-merge
on:
  workflow_call:
    inputs:
      app_id:
        required: false
        description: "GitHub App ID (deprecated) with permission to manage dependabot alerts; use 'client_id' instead"
        type: string
      client_id:
        description: "GitHub App Client ID with permission to manage dependabot alerts"
        required: false
        type: string

    secrets:
      app_private_key:
        required: true
        description: The private key associated with the App ID

jobs:
  actions_merge:
    runs-on: ubuntu-latest
    name: Dependabot Merge (action changes)
    permissions: {}
    if: |
      github.event.client_payload.base.actor == 'dependabot[bot]'
    steps:
      - name: "Create Token (using client-id)"
        # because passing in both app_id & client_id means you hit the wrong branch
        # inside Octokit.
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token-client-id
        if: inputs.client_id != ''
        with:
          client-id: ${{ inputs.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name}}

      - name: "Create Token (using app-id)"
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token-app-id
        if: inputs.app_id != ''
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name}}

      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token-client-id.outputs.token || steps.app-token-app-id.outputs.token }}
          ref: ${{ github.event.client_payload.base.ref }}
          persist-credentials: false

      - name: Dependabot Merge
        id: dependabot_merge
        uses: quotidian-ennui/actions-olio/dependabot-merge@80eb94186f07a299ea6a6954d56ee20926db1cd7 # v0.10.1
        with:
          token: ${{ steps.app-token-client-id.outputs.token || steps.app-token-app-id.outputs.token }}
          change_filter: ".github/workflows/**"
